<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>打卡记录</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #a0a09c;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --accent: #4f46e5;
    --accent-bg: #eeedfe;
    --accent-text: #3c3489;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #262624;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a0a09c;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --accent: #7f77dd;
      --accent-bg: #26215c;
      --accent-text: #cec bf6;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0.25rem 0 0.5rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-stats {
    font-size: 13px;
    color: var(--text3);
  }

  .header-stats strong {
    font-weight: 500;
    color: var(--text2);
  }

  /* cards */
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.15s;
    position: relative;
  }

  .card:hover { border-color: var(--border2); }

  .icon-ring {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    user-select: none;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .icon-ring:hover { border-color: var(--border2); }

  .info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 3px;
  }

  .count-area {
    display: flex;
    align-items: baseline;
    gap: 4px;
    flex-shrink: 0;
  }

  .count-num {
    font-size: 30px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    min-width: 48px;
    text-align: right;
    transition: color 0.1s;
  }

  .count-unit {
    font-size: 12px;
    color: var(--text3);
    align-self: flex-end;
    margin-bottom: 3px;
  }

  .btn-add {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
    flex-shrink: 0;
  }

  .btn-add:hover { background: var(--bg2); border-color: var(--accent); color: var(--accent); }
  .btn-add:active { transform: scale(0.91); }
  .btn-add i { font-size: 20px; }

  .btn-del {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 15px;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }

  .card:hover .btn-del { opacity: 1; }
  .btn-del:hover { color: #e24b4a; background: var(--bg2); }

  /* add row */
  .add-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .new-input {
    flex: 1;
    height: 40px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0 14px;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }

  .new-input:focus { border-color: var(--accent); }
  .new-input::placeholder { color: var(--text3); }

  .btn-create {
    height: 40px;
    padding: 0 18px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .btn-create:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* divider + total */
  .total-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0.25rem 0;
    border-top: 0.5px solid var(--border);
  }

  .total-label { font-size: 13px; color: var(--text3); }
  .total-num { font-size: 13px; font-weight: 500; color: var(--text2); }

  /* pop animation */
  @keyframes pop {
    0%   { transform: scale(1); }
    45%  { transform: scale(1.22); color: var(--accent); }
    100% { transform: scale(1); }
  }
  .popping { animation: pop 0.25s ease; }

  /* empty state */
  .empty {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text3);
    font-size: 14px;
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    background: var(--bg);
  }

  @media (max-width: 480px) {
    .count-num { font-size: 24px; }
    .btn-add { width: 36px; height: 36px; }
    .icon-ring { width: 40px; height: 40px; font-size: 19px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>打卡记录</h1>
    <span class="header-stats">总计 <strong id="totalCount">0</strong> 天</span>
  </div>

  <div id="list"></div>

  <div class="add-row">
    <input class="new-input" id="newName" placeholder="输入新项目名称，按回车添加…" maxlength="24" />
    <button class="btn-create" id="btnCreate">添加</button>
  </div>

  <div class="total-bar">
    <span class="total-label" id="itemCountLabel">共 0 个项目</span>
    <span class="total-num" id="lastUpdated"></span>
  </div>
</div>

<script>
  const EMOJIS = ['🎯','📚','🏃','💪','🧘','✍️','🎨','🎵','🌱','💧','🔥','⭐','🍎','🎮','🌍'];
  const KEY = 'ck_v2_habits';

  let habits = [];
  let nextId = 1;

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        habits = saved.habits || [];
        nextId = saved.nextId || (Math.max(...habits.map(h => h.id), 0) + 1);
      }
    } catch(e) {}
    if (habits.length === 0) {
      habits = [
        { id: 1, name: '读书', icon: '📚', count: 0 },
        { id: 2, name: '运动', icon: '🏃', count: 0 }
      ];
      nextId = 3;
    }
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify({ habits, nextId, updated: Date.now() }));
    } catch(e) {}
  }

  function totalDays() {
    return habits.reduce((s, h) => s + h.count, 0);
  }

  function updateTotals() {
    document.getElementById('totalCount').textContent = totalDays();
    document.getElementById('itemCountLabel').textContent = '共 ' + habits.length + ' 个项目';
    const raw = localStorage.getItem(KEY);
    if (raw) {
      try {
        const d = JSON.parse(raw);
        if (d.updated) {
          const dt = new Date(d.updated);
          document.getElementById('lastUpdated').textContent =
            '上次更新 ' + dt.getMonth() + 1 + '/' + dt.getDate() + ' ' +
            String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
        }
      } catch(e) {}
    }
  }

  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    if (habits.length === 0) {
      list.innerHTML = '<div class="empty">还没有打卡项目，在下方添加第一个吧 👇</div>';
      updateTotals();
      return;
    }

    habits.forEach(h => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = h.id;
      card.innerHTML = `
        <div class="icon-ring" title="点击换图标" data-icon="${h.id}">${h.icon}</div>
        <div class="info">
          <div class="habit-name">${escHtml(h.name)}</div>
          <div class="habit-sub">累计打卡天数</div>
        </div>
        <div class="count-area">
          <span class="count-num" id="num-${h.id}">${h.count}</span>
          <span class="count-unit">天</span>
        </div>
        <button class="btn-add" aria-label="打卡 +1" data-add="${h.id}">
          <i class="ti ti-plus" aria-hidden="true"></i>
        </button>
        <button class="btn-del" aria-label="删除此项目" data-del="${h.id}">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      `;
      list.appendChild(card);
    });

    updateTotals();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('list').addEventListener('click', e => {
    const addBtn = e.target.closest('[data-add]');
    const delBtn = e.target.closest('[data-del]');
    const iconBtn = e.target.closest('[data-icon]');

    if (addBtn) {
      const id = +addBtn.dataset.add;
      const h = habits.find(x => x.id === id);
      if (h) {
        h.count++;
        save();
        const el = document.getElementById('num-' + id);
        if (el) {
          el.textContent = h.count;
          el.classList.remove('popping');
          void el.offsetWidth;
          el.classList.add('popping');
        }
        updateTotals();
      }
    }

    if (delBtn) {
      const id = +delBtn.dataset.del;
      const h = habits.find(x => x.id === id);
      if (h && confirm('删除「' + h.name + '」？此操作不可撤销。')) {
        habits = habits.filter(x => x.id !== id);
        save();
        render();
      }
    }

    if (iconBtn) {
      const id = +iconBtn.dataset.icon;
      const h = habits.find(x => x.id === id);
      if (h) {
        const idx = EMOJIS.indexOf(h.icon);
        h.icon = EMOJIS[(idx + 1) % EMOJIS.length];
        iconBtn.textContent = h.icon;
        save();
      }
    }
  });

  document.getElementById('btnCreate').addEventListener('click', () => {
    const inp = document.getElementById('newName');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const icon = EMOJIS[habits.length % EMOJIS.length];
    habits.push({ id: nextId++, name, icon, count: 0 });
    inp.value = '';
    save();
    render();
    inp.focus();
  });

  document.getElementById('newName').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnCreate').click();
  });

  load();
  render();
</script>
</body>
</html>
